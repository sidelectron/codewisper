# Deploy to Google Cloud Run on push to main
# GCP_PROJECT_ID: set in Variables or Secrets (Settings → Secrets and variables → Actions)
# GCP_SA_KEY: set in Secrets only (full contents of service account JSON key)

name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required config
        run: |
          PROJECT_ID="${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}"
          if [ -z "$PROJECT_ID" ]; then
            echo "::error::GCP_PROJECT_ID is not set. Add it in Settings → Secrets and variables → Actions (Variables tab or Secrets tab)."
            exit 1
          fi
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "::error::GCP_SA_KEY must be in Secrets (not Variables). Add it in Settings → Secrets and variables → Actions → Secrets."
            exit 1
          fi
          echo "Config OK (project: $PROJECT_ID)."

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}

      - name: Build, push, and deploy
        run: gcloud builds submit --config=cloudbuild.yaml --project=${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}
