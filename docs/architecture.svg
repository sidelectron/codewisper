<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <title>CodeWhisper Architecture</title>
  <rect width="800" height="520" fill="#f8fafc"/>
  <!-- Browser -->
  <rect x="280" y="20" width="240" height="70" rx="6" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
  <text x="400" y="48" text-anchor="middle" font-weight="bold" font-size="14">Browser (React)</text>
  <text x="400" y="68" text-anchor="middle" font-size="11" fill="#475569">Screen Share · Mic · Speaker · WebSocket</text>
  <!-- Backend / Cloud Run -->
  <rect x="120" y="120" width="360" height="220" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="300" y="142" text-anchor="middle" font-weight="bold" font-size="13">Backend (FastAPI + ADK)  Cloud Run</text>
  <rect x="140" y="152" width="160" height="28" rx="4" fill="#bfdbfe"/>
  <text x="220" y="170" text-anchor="middle" font-size="11">Root Agent (Orchestrator)</text>
  <rect x="140" y="188" width="160" height="22" rx="3" fill="#93c5fd"/>
  <text x="220" y="203" text-anchor="middle" font-size="10">Code Review · get_file, list_files</text>
  <rect x="140" y="216" width="160" height="22" rx="3" fill="#93c5fd"/>
  <text x="220" y="231" text-anchor="middle" font-size="10">Security · get_file, get_git_diff</text>
  <rect x="140" y="244" width="160" height="22" rx="3" fill="#93c5fd"/>
  <text x="220" y="259" text-anchor="middle" font-size="10">Navigator · open_file, click, scroll</text>
  <rect x="140" y="272" width="160" height="22" rx="3" fill="#93c5fd"/>
  <text x="220" y="287" text-anchor="middle" font-size="10">Summary · get_git_diff, list_files</text>
  <!-- Gemini -->
  <rect x="520" y="140" width="180" height="80" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="610" y="168" text-anchor="middle" font-weight="bold" font-size="12">Gemini Live API</text>
  <text x="610" y="188" text-anchor="middle" font-size="10">audio + vision + tool calling</text>
  <!-- Code Watcher -->
  <rect x="80" y="380" width="200" height="60" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="180" y="405" text-anchor="middle" font-weight="bold" font-size="12">Code Watcher (Local)</text>
  <text x="180" y="425" text-anchor="middle" font-size="10">Python · watchdog · file data</text>
  <!-- Click Agent -->
  <rect x="420" y="380" width="200" height="60" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="520" y="405" text-anchor="middle" font-weight="bold" font-size="12">Click Agent (Local)</text>
  <text x="520" y="425" text-anchor="middle" font-size="10">Python · pyautogui · UI interaction</text>
  <!-- Local label -->
  <text x="400" y="370" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">Local</text>
  <!-- Arrows -->
  <path d="M 400 90 L 400 120" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 300 200 L 520 200" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 180 340 L 180 380" stroke="#475569" stroke-width="1.5"/>
  <path d="M 420 340 L 420 380" stroke="#475569" stroke-width="1.5"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#475569"/></marker></defs>
</svg>
